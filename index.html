<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles/styles.css">
        <title>Social links Profile</title>
    </head>

    <body>

        <main>
            <section>
                <div class="links-card-container">

                    <div class="card-img">
                        <img src="images/avatar-jessica.jpeg" alt="Jessica's profile picture">
                    </div>
                    <div class="card-info">
                        <h1 class="card-name">Jessica Randall</h1>
                        <h2 class="card-location">London, United Kingdom</h2>
                    </div>
                    <div class="card-description">
                        <p>"Front-end developer and avid reader."</p>
                    </div>

                    <div class="card-social-container">
                        <ul aria-label="Social links" class="card-social-links">
                            <li class="card-social-github"><a href="https://github.com">GitHub</a></li>
                            <li class="card-social-frontendmentor"><a href="https://www.frontendmentor.io">Frontend Mentor</a></li>
                            <li class="card-social-linkedin"><a href="https://www.linkedin.com">LinkedIn</a></li>
                            <li class="card-social-x"><a href="https://x.com">X (Twitter)</a></li>
                            <li class="card-social-instagram"><a href="https://www.instagram.com">Instagram</a></li>
                        </ul>
                    </div>

                </div>
            </section>
        </main>

        <footer class="attribution">
            <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.</p>
            <p>Coded by <a href="https://github.com/nazgrimm">Nazgrimm</a>.</p>
        </footer>
    </body>
</html>
